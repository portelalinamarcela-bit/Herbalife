<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto - Herbalife</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: #fff;
      color: #5c5c5c;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background-color: #ffffff;
      border-bottom: 2px solid #e0e0e0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 45px;
    }

    .logo h1 {
      color: #5baa4a;
      font-size: 1.8rem;
      margin: 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      color: #5baa4a;
      font-weight: bold;
      transition: 0.3s;
    }

    nav ul li a:hover {
      border-bottom: 2px solid #5baa4a;
    }

    .btn-sesion {
      background-color: #5baa4a;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    main {
      padding: 50px 80px;
      background-color: #f9f9f9;
      min-height: 80vh;
    }

    h2 {
      text-align: center;
      color: #5baa4a;
      font-size: 2rem;
      margin-bottom: 30px;
    }

    .contacto-form {
      background-color: #fff;
      padding: 30px;
      max-width: 600px;
      margin: 0 auto;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .contacto-form input,
    .contacto-form textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
      font-family: 'Poppins', sans-serif;
      transition: 0.3s;
    }

    .contacto-form input:focus,
    .contacto-form textarea:focus {
      border-color: #5baa4a;
      box-shadow: 0 0 4px rgba(91, 170, 74, 0.5);
    }

    .contacto-form button {
      background-color: #5baa4a;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .contacto-form button:hover {
      background-color: #4b8f3f;
    }

    footer {
      text-align: center;
      background-color: #5baa4a;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }

    @media (max-width: 900px) {
      main {
        padding: 30px 20px;
      }

      .contacto-form {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="logo-herbalife.png" alt="Herbalife Logo" />
      <h1>Herbalife</h1>
    </div>

    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="pedidos.html">Pedidos</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>

    <div>
      <a href="login.html"><button class="btn-sesion">Cerrar Sesión</button></a>
    </div>
  </header>

  <main>
    <h2>Contáctanos</h2>

    <div class="contacto-form">
      <form id="formContacto">
        <input type="text" id="nombre" placeholder="Tu nombre" required />
        <input type="email" id="correo" placeholder="Tu correo electrónico" required />
        <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
        <button type="submit">Enviar mensaje</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Herbalife - Proyecto Formativo</p>
  </footer>

  <script>
    document.getElementById("formContacto").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("✅ Tu mensaje fue enviado correctamente. ¡Gracias por contactarnos!");
      this.reset();
    });
  </script>
</body>
</html>
