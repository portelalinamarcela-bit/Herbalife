<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Cuenta - Herbalife</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f8f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 380px;
    }

    img {
      width: 80px;
      margin-bottom: 15px;
    }

    p {
      color: #333;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      font-style: italic;
    }

    input:focus {
      border-color: #4CAF50;
      box-shadow: 0 0 4px #4CAF50;
    }

    button {
      margin-top: 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 12px;
      width: 95%;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/61/61457.png" alt="candado">
    <p>
      Acabamos de enviarte un código de verificación a tu dirección de correo electrónico.<br>
      Ingresa el código abajo:
    </p>
    <input type="text" placeholder="Tu código">
    <button>→</button>
  </div>
</body>
</html>
