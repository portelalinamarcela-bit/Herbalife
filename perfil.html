<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Perfil - Herbalife</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: #f9f9f9;
      color: #5c5c5c;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background-color: #ffffff;
      border-bottom: 2px solid #e0e0e0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 45px;
    }

    .logo h1 {
      color: #5baa4a;
      font-size: 1.8rem;
      margin: 0;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      text-decoration: none;
      color: #5baa4a;
      font-weight: bold;
      transition: 0.3s;
    }

    nav ul li a:hover {
      border-bottom: 2px solid #5baa4a;
    }

    .btn-sesion {
      background-color: #5baa4a;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-sesion:hover {
      background-color: #4b8f3f;
    }

    main {
      padding: 50px 80px;
      display: flex;
      justify-content: center;
    }

    .perfil-contenedor {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #5baa4a;
      margin-bottom: 20px;
    }

    .foto-perfil {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .foto-perfil img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #5baa4a;
    }

    .foto-perfil input {
      display: none;
    }

    .cambiar-foto {
      position: absolute;
      bottom: 0;
      right: 0;
      background-color: #5baa4a;
      color: white;
      border-radius: 50%;
      padding: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    form {
      text-align: left;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 10px 0 5px;
      color: #5c5c5c;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-family: 'Poppins', sans-serif;
    }

    input:focus {
      border-color: #5baa4a;
      box-shadow: 0 0 4px rgba(91, 170, 74, 0.5);
      outline: none;
    }

    .btn-guardar {
      background-color: #5baa4a;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      width: 100%;
    }

    .btn-guardar:hover {
      background-color: #4b8f3f;
    }

    .ajustes {
      margin-top: 30px;
      text-align: left;
    }

    .ajustes h3 {
      color: #5baa4a;
    }

    .ajustes button {
      margin-top: 10px;
      background-color: #e53935;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .ajustes button:hover {
      background-color: #b71c1c;
    }

    footer {
      text-align: center;
      background-color: #5baa4a;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }

    @media (max-width: 900px) {
      main {
        padding: 30px 20px;
      }

      .perfil-contenedor {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <img src="logo-herbalife.png" alt="Herbalife Logo">
      <h1>Herbalife</h1>
    </div>

    <nav>
      <ul>
        <li><a href="dashboard.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="pedidos.html">Pedidos</a></li>
        <li><a href="perfil.html">Mi Perfil</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>

    <div>
      <a href="login.html"><button class="btn-sesion">Cerrar sesión</button></a>
    </div>
  </header>

  <main>
    <div class="perfil-contenedor">
      <h2>Mi Perfil</h2>

      <div class="foto-perfil">
        <img id="fotoUsuario" src="perfil-default.jpg" alt="Foto de perfil">
        <label for="fotoInput" class="cambiar-foto">📷</label>
        <input type="file" id="fotoInput" accept="image/*">
      </div>

      <form id="perfilForm">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" value="Lina Marcela Portela" required>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" value="usuario@herbalife.com" required>

        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" value="+57 310 000 0000">

        <label for="tamañoTexto">Tamaño de texto</label>
        <select id="tamañoTexto">
          <option value="16px">Normal</option>
          <option value="18px">Grande</option>
          <option value="20px">Extra grande</option>
        </select>

        <button type="submit" class="btn-guardar">Guardar cambios</button>
      </form>

      <div class="ajustes">
        <h3>Otros ajustes</h3>
        <button id="eliminarCuenta">Eliminar cuenta</button>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Herbalife - Proyecto Formativo</p>
  </footer>

  <script>
    // Cambiar foto de perfil
    const fotoInput = document.getElementById("fotoInput");
    const fotoUsuario = document.getElementById("fotoUsuario");

    fotoInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = () => (fotoUsuario.src = reader.result);
        reader.readAsDataURL(file);
      }
    });

    // Guardar cambios del formulario
    document.getElementById("perfilForm").addEventListener("submit", function (e) {
      e.preventDefault();
      alert("✅ Cambios guardados correctamente.");
    });

    // Ajustar tamaño de texto
    document.getElementById("tamañoTexto").addEventListener("change", function () {
      document.body.style.fontSize = this.value;
    });

    // Eliminar cuenta
    document.getElementById("eliminarCuenta").addEventListener("click", function () {
      if (confirm("¿Estás seguro de que deseas eliminar tu cuenta? Esta acción no se puede deshacer.")) {
        alert("🗑️ Tu cuenta ha sido eliminada correctamente.");
        window.location.href = "login.html";
      }
    });
  </script>
</body>
</html>
