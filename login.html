<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Herbalife</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #FFFFFF, #FFFFFF);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: #FFFFFF;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: "";
            position: absolute;
            top: -40px;
            left: -40px;
            width: 150%;
            height: 150%;
            background: #D4F5D0;
            border-radius: 50%;
            z-index: -1;
        }

        .login-container img {
            width: 50px;
            margin-bottom: 5px;
        }   

        .login-container h1{
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            color: #5baa4a;
            margin: 0;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .login-container h2 {
            margin: 25px 0 15px;
            font-size: 20px;
            color: #5c5c5c;
            font-weight: bold;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #5c5c5c;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 12px;
            color: #5c5c5c;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .login-container input:focus {
            border-color: #5baa4a;
            box-shadow: 0 0 4px rgba(76, 175, 80, 0.6);
            outline: none;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #5baa4a;
            color: #FFFFFF;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .login-container button:hover {
            background: #095f00;
        }

        .create-account {
            font-size: 14px;
            color: #5c5c5c;
            font-weight: 600;
            cursor: pointer;
        }

        .create-account:hover {
            color: #5baa4a;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="logo.png" alt="Herbalife Logo">
        <h1>Herbalife</h1>

        <h2>Bienvenido</h2>

        <form id="loginForm">
            <input type="email" id="correo" placeholder="Correo electrónico" required>
            <input type="password" id="contrasena" placeholder="Contraseña" required>
            <span class="forgot-password">¿Olvidaste tu contraseña?</span>
            <button type="submit">Iniciar Sesión</button>
        </form>

        <div class="create-account" onclick="window.location.href='registro.html'">Crear una cuenta</div>
    </div>

    <script>
        // Simulación de credenciales de ejemplo
        const usuarios = [
            { correo: "admin@herbalife.com", contrasena: "admin123" },
            { correo: "cliente@herbalife.com", contrasena: "cliente123" }
        ];

        document.getElementById("loginForm").addEventListener("submit", function(event){
            event.preventDefault();
            const correo = document.getElementById("correo").value;
            const contrasena = document.getElementById("contrasena").value;

            const usuario = usuarios.find(u => u.correo === correo && u.contrasena === contrasena);

            if (usuario) {
                // Redirige al inicio si el usuario existe
                window.location.href = "inicio.html";
            } else {
                alert("Correo o contraseña incorrectos. Intenta nuevamente.");
            }
        });
    </script>
</body>
</html>
